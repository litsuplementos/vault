<!-- pass.html -->
 
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIT Vault — Bóveda</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="timer-bar" id="timer-bar"></div>
  <div class="vault-bg-pattern"></div>
  <div class="vault-grid"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <nav class="vault-nav">
    <div class="vault-nav-logo">LIT <span style="color: var(--rose-dim);">VAULT</span></div>
    <div class="vault-nav-badge">AES-256 ENCRIPTADO</div>
    <div class="vault-nav-user">
      <span id="nav-user">—</span>
      <span class="session-timer" id="session-timer">15:00</span>
      <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
    </div>
  </nav>

  <div class="main-wrap">

    <div class="add-panel fade-in">
      <p class="add-panel-title">Nueva Credencial</p>
      <div class="add-grid">
        <div>
          <label class="field-label" for="inp-site">Servicio</label>
          <input class="vault-input uppercase" type="text" id="inp-site" placeholder="Gmail, GitHub..."/>
        </div>
        <div>
          <label class="field-label" for="inp-user">Usuario / Email</label>
          <input class="vault-input" type="text" id="inp-user" placeholder="usuario@email.com" autocomplete="off"/>
        </div>
        <div>
          <label class="field-label" for="inp-pass">Contraseña</label>
          <div class="input-password-wrap">
            <input class="vault-input" type="password" id="inp-pass" placeholder="••••••••" autocomplete="off"/>
            <button type="button" class="btn-toggle-pass" onclick="togglePassInput('inp-pass', this)" tabindex="-1">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div>
          <label class="field-label" for="inp-notes">Notas</label>
          <input class="vault-input" type="text" id="inp-notes" placeholder="Cuenta personal, trabajo..." autocomplete="off"/>
        </div>
        <div class="add-grid-save">
          <button class="btn-save" onclick="saveCredential()">Guardar</button>
        </div>
      </div>
      <div id="add-msg"></div>
      <p class="add-note">Las contraseñas se encriptan antes de subirse a la base de datos.</p>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <span class="toolbar-title">Bóveda</span>
        <span class="toolbar-count" id="cred-count">— registros</span>
      </div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" id="search-input" placeholder="Buscar servicio..." oninput="filterCredentials()"/>
      </div>
    </div>

    <div class="credentials-grid" id="credentials-grid"></div>

  </div>

  <div class="toast" id="toast">Copiado al portapapeles</div>

  <script src="app.js"></script>
</body>
</html>
