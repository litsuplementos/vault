<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIT Bóveda</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="timer-bar" id="timer-bar"></div>
  <div class="vault-bg-pattern"></div>
  <div class="vault-grid"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <nav class="vault-nav">
    <div class="vault-nav-logo">LIT <span>VAULT</span></div>
    <div class="vault-nav-user">
      <span id="nav-user">—</span>
      <span class="session-timer" id="session-timer">15:00</span>
      <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
    </div>
  </nav>

  <!-- PESTAÑAS -->
  <div class="tabs-wrap">
    <button class="tab-btn" id="tab-nueva" onclick="switchTab('nueva')">Nueva Credencial</button>
    <button class="tab-btn active" id="tab-boveda" onclick="switchTab('boveda')">Bóveda</button>
  </div>

  <div class="main-wrap">

    <!-- PANEL: NUEVA CREDENCIAL -->
    <div class="tab-panel" id="panel-nueva" style="display:none;">
      <div class="add-panel fade-in">
        <p class="add-panel-title">Nueva Credencial</p>
        <div class="add-grid">
          <div>
            <label class="field-label" for="inp-site">Servicio</label>
            <input class="vault-input uppercase" type="text" id="inp-site"
              placeholder="Gmail, GitHub..."
              autocomplete="new-password"
              readonly onfocus="this.removeAttribute('readonly')"/>
          </div>
          <div>
            <label class="field-label" for="inp-user">Usuario / Email</label>
            <input class="vault-input" type="text" id="inp-user"
              placeholder="usuario@email.com"
              autocomplete="new-password"
              readonly onfocus="this.removeAttribute('readonly')"/>
          </div>
          <div>
            <label class="field-label" for="inp-pass">Contraseña</label>
            <div class="input-password-wrap">
              <input class="vault-input" type="password" id="inp-pass"
                placeholder="••••••••"
                autocomplete="new-password"
                readonly onfocus="this.removeAttribute('readonly')"/>
              <button type="button" class="btn-toggle-pass" onclick="togglePassInput('inp-pass', this)" tabindex="-1">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div>
            <label class="field-label" for="inp-notes">Notas</label>
            <input class="vault-input" type="text" id="inp-notes"
              placeholder="Cuenta personal, trabajo..."
              autocomplete="off"/>
          </div>
          <div class="add-grid-save">
            <button class="btn-save" onclick="saveCredential()">Guardar</button>
          </div>
        </div>
        <div id="add-msg"></div>
        <p class="add-note">Las contraseñas se encriptan antes de subirse a la base de datos.</p>
      </div>
    </div>

    <!-- PANEL: BÓVEDA -->
    <div class="tab-panel" id="panel-boveda">
      <div class="toolbar">
        <div class="toolbar-left">
          <span class="toolbar-title">Bóveda</span>
          <span class="toolbar-count" id="cred-count">— registros</span>
        </div>
        <div class="toolbar-right">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input class="search-input" type="text" id="search-input"
              placeholder="Buscar servicio..." oninput="filterCredentials()"/>
          </div>
          <!-- Ver/Ocultar global -->
          <button class="btn-global-toggle" id="btn-global-vis" onclick="toggleAllPasswords()">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <span id="global-vis-label">Ver todo</span>
          </button>
          <!-- Toggle vista -->
          <div class="view-toggle">
            <button class="view-btn" id="btn-view-rows" onclick="setView('rows')" title="Vista filas">
              <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" width="16" height="16">
                <rect x="2" y="3" width="14" height="3" rx="1"/>
                <rect x="2" y="8" width="14" height="3" rx="1"/>
                <rect x="2" y="13" width="14" height="3" rx="1"/>
              </svg>
            </button>
            <button class="view-btn" id="btn-view-cards" onclick="setView('cards')" title="Vista tarjetas">
              <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" width="16" height="16">
                <rect x="2" y="2" width="6" height="6" rx="1"/>
                <rect x="10" y="2" width="6" height="6" rx="1"/>
                <rect x="2" y="10" width="6" height="6" rx="1"/>
                <rect x="10" y="10" width="6" height="6" rx="1"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div id="credentials-container"></div>
    </div>

  </div>

  <div class="toast" id="toast">Copiado al portapapeles</div>

  <script src="app.js"></script>
</body>
</html>
