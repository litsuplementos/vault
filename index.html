<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIT Vault — Acceso</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

    .login-card {
      position: relative; z-index: 5;
      width: 400px; padding: 48px 40px 40px;
      border: 1px solid var(--rose-dim);
      background: var(--bg-card);
      text-align: center;
      border-radius: var(--radius-md);
      box-shadow: 0 16px 56px rgba(196,120,138,0.12), 0 2px 10px rgba(184,146,74,0.07);
      animation: fadeInUp 0.6s ease both;
    }

    .vault-icon { margin: 0 auto 28px; display: block; }

    .login-title {
      font-family: var(--font-display);
      font-size: 32px; font-weight: 900; letter-spacing: 8px;
      color: var(--rose); line-height: 1;
    }

    .login-subtitle {
      font-family: var(--font-display);
      font-size: 10px; letter-spacing: 3px; color: var(--text-dim);
      margin: 10px 0 26px;
    }

    .field-wrap { text-align: left; margin-bottom: 16px; }

    .login-footer {
      margin-top: 28px; font-family: var(--font-display);
      font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
    }
    .login-footer span { color: var(--rose-dim); margin: 0 6px; }

    #login-msg {
      min-height: 22px; font-family: var(--font-body);
      font-size: 15px; font-style: italic; margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="vault-bg-pattern"></div>
  <div class="vault-grid"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="login-card">
    <svg class="vault-icon lock-pulse" width="76" height="76" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="11" y="32" width="50" height="34" rx="3" fill="rgba(232,180,192,0.18)" stroke="#c4788a" stroke-width="1.5"/>
      <rect x="15" y="36" width="42" height="26" rx="2" fill="none" stroke="rgba(196,120,138,0.18)" stroke-width="0.75"/>
      <path d="M22 32V23a14 14 0 0 1 28 0v9" stroke="#c4788a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="36" cy="50" r="5.5" fill="rgba(212,176,122,0.15)" stroke="#b8924a" stroke-width="1.2"/>
      <line x1="36" y1="55.5" x2="36" y2="59" stroke="#b8924a" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="17" cy="43" r="1.8" fill="rgba(196,120,138,0.35)"/>
      <circle cx="55" cy="43" r="1.8" fill="rgba(196,120,138,0.35)"/>
      <circle cx="17" cy="55" r="1.8" fill="rgba(196,120,138,0.35)"/>
      <circle cx="55" cy="55" r="1.8" fill="rgba(196,120,138,0.35)"/>
      <line x1="11"  y1="43" x2="15.5" y2="43" stroke="rgba(196,120,138,0.25)" stroke-width="0.75"/>
      <line x1="56.5" y1="43" x2="61"  y2="43" stroke="rgba(196,120,138,0.25)" stroke-width="0.75"/>
      <line x1="26" y1="2" x2="26" y2="7" stroke="rgba(184,146,74,0.22)" stroke-width="0.75"/>
      <line x1="36" y1="2" x2="36" y2="6" stroke="rgba(184,146,74,0.22)" stroke-width="0.75"/>
      <line x1="46" y1="2" x2="46" y2="7" stroke="rgba(184,146,74,0.22)" stroke-width="0.75"/>
    </svg>

    <h1 class="login-title">LIT VAULT</h1>
    <p class="login-subtitle">Acceso Restringido · Solo Administrador</p>

    <div class="divider"></div>

    <div class="field-wrap">
      <label class="field-label" for="inp-user">Administrador</label>
      <input class="vault-input" type="text" id="inp-user" placeholder="usuario" autocomplete="off" spellcheck="false"/>
    </div>

    <div class="field-wrap">
      <label class="field-label" for="inp-pass">Clave Maestra</label>
      <input class="vault-input" type="password" id="inp-pass" placeholder="••••••••••••" autocomplete="off"/>
    </div>

    <button class="btn-primary" id="btn-login" onclick="attemptLogin()">Abrir Bóveda</button>

    <div id="login-msg"></div>

    <div class="login-footer">
      AES-256 <span>·</span> CIFRADO LOCAL <span>·</span> SESIÓN 15 MIN
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://jaoirokvofscundirnzk.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imphb2lyb2t2b2ZzY3VuZGlybnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzU3NzMsImV4cCI6MjA5MDY1MTc3M30.U1NsVWh3ephcLjh8LGVVwQrAiEZJFt_BLiZYABgZmBY";
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function setMsg(text, type = 'error') {
      const el = document.getElementById('login-msg');
      el.textContent = text;
      el.style.color = type === 'error'   ? 'var(--danger)'
                     : type === 'success' ? 'var(--success)'
                     : 'var(--gold)';
    }

    async function attemptLogin() {
      const username = document.getElementById('inp-user').value.trim();
      const password = document.getElementById('inp-pass').value;
      const btn = document.getElementById('btn-login');

      if (!username || !password) { setMsg('Ingresa tus credenciales.'); return; }

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      setMsg('Autenticando...', 'info');

      try {
        const { data, error } = await _sb.rpc('verify_admin', {
          p_username: username,
          p_password_hash: CryptoJS.SHA256(password).toString()
        });

        if (error) throw error;

        if (data === true) {
          sessionStorage.setItem('masterKey', password);
          sessionStorage.setItem('sessionStart', Date.now().toString());
          sessionStorage.setItem('adminUser', username);
          setMsg('Acceso concedido. Abriendo bóveda...', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 800);
        } else {
          setMsg('Credenciales incorrectas. Acceso denegado.');
          btn.disabled = false;
          btn.textContent = 'Abrir Bóveda';
        }
      } catch (err) {
        console.error(err);
        setMsg('Error de conexión. Revisa tu configuración.');
        btn.disabled = false;
        btn.textContent = 'Abrir Bóveda';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

    // Si ya hay sesión válida, saltar directamente al vault
    (function checkSession() {
      const start = sessionStorage.getItem('sessionStart');
      const key   = sessionStorage.getItem('masterKey');
      if (start && key && (Date.now() - parseInt(start)) < 15 * 60 * 1000) {
        window.location.href = 'index.html';
      } else {
        sessionStorage.clear();
      }
    })();
  </script>
</body>
</html>
